id: path-verification
name: Path Claims Verification
type: validation
description: >-
  Verifies plan-author claims about file paths, line counts, and symbol
  locations by parsing the agent's `verified_paths:` block from stdin
  (via response injection) and checking each claim against the filesystem.
  Provides ground-truth enforcement that the verification step's
  structural pattern (Phase 2.5 of >>implementation_plan) cannot.
severity: high
gate_type: custom
guidanceFile: guidance.md

pass_criteria:
  - type: shell_verify
    shell_command: 'node scripts/verify-path-claims.mjs'
    shell_stdin_source: agent_response
    shell_timeout: 10000

retry_config:
  max_attempts: 2
  improvement_hints: true
  preserve_context: true

activation:
  prompt_categories: [planning]
  explicit_request: true
